# spark-defaults.conf — loaded by the Spark container at startup
# Uses container hostnames (resolvable within dwh-net Docker network)

# ── HDFS ──────────────────────────────────────────────────
spark.hadoop.fs.defaultFS                       hdfs://namenode:8020

# ── Hive Metastore ────────────────────────────────────────
spark.sql.catalogImplementation                 hive
spark.hadoop.hive.metastore.uris                thrift://hive-metastore:9083
spark.sql.warehouse.dir                         hdfs://namenode:8020/user/hive/warehouse

# ── Iceberg (enable when added to stack) ──────────────────
# spark.sql.extensions                          org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
# spark.sql.catalog.spark_catalog               org.apache.iceberg.spark.SparkSessionCatalog
# spark.sql.catalog.spark_catalog.type          hive

# ── Performance ───────────────────────────────────────────
spark.sql.adaptive.enabled                      true
spark.sql.adaptive.coalescePartitions.enabled   true
